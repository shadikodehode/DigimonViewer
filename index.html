<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Digimon Viewer</title>
	<link rel="stylesheet" href="styles/general.css">
	<link rel="stylesheet" href="styles/header.css">
	<link rel="stylesheet" href="styles/card.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Jersey+10&family=Pixelify+Sans:wght@400..700&family=Silkscreen:wght@400;700&family=Tiny5&family=VT323&display=swap" rel="stylesheet">
</head>
<body>
	<div class="header-container"> <!--Header Start-->
		<div class="header">
			<div class="header-logo">
				<!-- <div class="logo">Digimons
				</div> -->
				<img class="logo" src="icons/Digimon_Logo.svg" alt="digimon-logo">
			</div>
			<div class="header-searchbar">
				<input class="searchbar"
				type="search"
				placeholder="SEARCH DIGIMON..."
				autocomplete="digimon-name"
				inputmode="search">
				</div>
			<div class="header-button">
				<div class="button-container">
					<button class="button">
						<div>Level</div>
						<div class="arrow">v</div>
					</button>
					<div class="button-content">
						<div class="button-content-link">Baby</div>
						<div class="button-content-link">Child</div>
						<div class="button-content-link">Adult</div>
						<div class="button-content-link">Perfect</div>
					</div>
				</div>
				<div class="button-container">
					<button class="button">
						<div>Attribute</div>
						<div class="arrow">v</div>
					</button>
					<div class="button-content">
						<div class="button-content-link">Vaccine</div>
						<div class="button-content-link">Virus</div>
						<div class="button-content-link">Data</div>
						<div class="button-content-link">Free</div>
					</div>
				</div>
				<div class="button-container">
					<button class="button">
						<div>Type</div>
						<div class="arrow">v</div>
					</button>
					<div class="button-content">
						<div class="button-content-link">Reptile</div>
						<div class="button-content-link">Mammal</div>
						<div class="button-content-link">Dinosaur</div>
						<div class="button-content-link">Insect</div>
						<div class="button-content-link">beast</div>
						<div class="button-content-link">Slmie</div>
						<div class="button-content-link">Mythical</div>
						<div class="button-content-link">Lesser</div>
						<div class="button-content-link">Cyborg</div>
					</div>
				</div>
					
			</div>
			</div>          
		</div>
	</div> <!--Header End-->

	<div class="card-container">
		<div class="card">
			<div class="card-appearance">
				<img class="card-image" src="cards/Agumon.png" alt="">
				<div class="card-name">Augumon</div>
				<div class="card-level-rookie">Rookie</div>
			</div>
		</div>
		<div class="card">
			<div class="card-appearance">
				<img class="card-image" src="cards/Baboongamon.png" alt="">
				<div class="card-name">Baboongamon</div>
				<div class="card-level-ultimate">Ultimate</div>
			</div>
		</div>
		<div class="card">
			<div class="card-appearance">
				<img class="card-image" src="cards/Dracomon (X-Antibody).png" alt="">
				<div class="card-name">Dracomon</div>
				<div class="card-level-mega">Mega</div>
			</div>
		</div>
		<div class="card">
			<div class="card-appearance">
				<img class="card-image" src="cards/Shoeshoemon.png" alt="">
				<div class="card-name">Shoeshoemon</div>
				<div class="card-level-training1">In-Training I</div>
			</div>
		</div>
		<div class="card">
			<div class="card-appearance">
				<img class="card-image" src="cards/Sistermon Ciel.png" alt="">
				<div class="card-name">Sistermon</div>
				<div class="card-level card-level-training2">In-Training II</div>
			</div>
		</div>
		<div class="card">
			<div class="card-appearance">
				<img class="card-image" src="cards/Starmon.png" alt="">
				<div class="card-name">Starmon</div>
				<div class="card-level card-level-champion">
					<div>Champion</div>
				</div>
				
			</div>
		</div>
		
	</div>
</body>
</html>
