<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" href="https://digi-api.com/favicon.png"> <!--tab icon-->
	<title>Digimon Viewer</title> <!--tab title-->
	<link rel="stylesheet" href="styles/general.css">
	<link rel="stylesheet" href="styles/header.css">
	<link rel="stylesheet" href="styles/card.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Jersey+10&family=Pixelify+Sans:wght@400..700&family=Silkscreen:wght@400;700&family=Tiny5&family=VT323&display=swap" rel="stylesheet">
</head>
<body>

<div class="modal-main">

  <div class="modal-container
	js-modal-container">
  </div>
</div>
<!--styling-->
<div> 
	<!--header-->
	<div class="header-container"> 
		<div class="header">
			<div class="header-logo">
				<!-- <div class="logo">Digimons
				</div> -->
				<img class="logo" src="icons/Digimon_Logo.svg" alt="digimon-logo">
			</div>
			<div class="header-searchbar">
				<input class="searchbar"
				type="search"
				placeholder="SEARCH DIGIMON..."
				autocomplete="digimon-name"
				inputmode="search">
				</div>
			<div class="header-button">
				<div class="button-container">
					<button class="button">
						<div>Level</div>
						<div class="arrow">v</div>
					</button>
					<div class="button-content">
						<div class="button-content-link">Baby</div>
						<div class="button-content-link">Child</div>
						<div class="button-content-link">Adult</div>
						<div class="button-content-link">Perfect</div>
					</div>
				</div>
				<div class="button-container">
					<button class="button">
						<div>Attribute</div>
						<div class="arrow">v</div>
					</button>
					<div class="button-content">
						<div class="button-content-link">Vaccine</div>
						<div class="button-content-link">Virus</div>
						<div class="button-content-link">Data</div>
						<div class="button-content-link">Free</div>
					</div>
				</div>
				<div class="button-container">
					<button class="button">
						<div>Type</div>
						<div class="arrow">v</div>
					</button>
					<div class="button-content">
						<div class="button-content-link">Reptile</div>
						<div class="button-content-link">Mammal</div>
						<div class="button-content-link">Dinosaur</div>
						<div class="button-content-link">Insect</div>
						<div class="button-content-link">beast</div>
						<div class="button-content-link">Slmie</div>
						<div class="button-content-link">Mythical</div>
						<div class="button-content-link">Lesser</div>
						<div class="button-content-link">Cyborg</div>
					</div>
				</div>
					
			</div>
			</div>          
		</div>
		<!--/header--> 
<!--card-->
<div class="card-main">
	<div class="card-container
	js-card-container"> 	
	</div> 
</div>
	<!--/card-->
</div>
<!--/styling-->

<script src="data/digimonAPI.js"></script>

<!--script header-->
<script src="scripts/header.js">

</script>
<!--/script header-->

<!--script card-->

<script src="scripts/card.js">
</script>
<!--/script card-->

</body>
</html>
